<!-- web/species.html -->
<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Observations – Filtre par espèce</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header class="title-bar">
    <h1>Observations de Phasianidae — filtre espèce</h1>
    <p>Slider temporel · points + clustering · France métropolitaine</p>
  </header>

  <div id="map"></div>

  <div class="panel">
    <div class="panel-left">
      <div><b>Année :</b> <span id="yearValue">—</span></div>
      <div class="muted" id="countValue">Points: —</div>
    </div>

    <label class="muted" style="display:flex;align-items:center;gap:8px;">
      <span>Espèce :</span>
      <input id="speciesSearch" type="text" placeholder="Rechercher…" />
      <select id="speciesSelect"></select>
    </label>

    <label class="muted" for="sortSelect" style="display:flex;align-items:center;gap:8px;">
      <span>Tri :</span>
      <select id="sortSelect">
        <option value="count">Les + fréquentes</option>
        <option value="alpha">A → Z</option>
      </select>
    </label>

    <label class="muted" for="modeSelect" style="display:flex;align-items:center;gap:8px;">
      <span>Mode :</span>
      <select id="modeSelect">
        <option value="year">Année seule</option>
        <option value="cumulative">Cumulatif (≤ année)</option>
      </select>
    </label>

    <input id="yearSlider" type="range" min="2000" max="2025" step="1" value="2015" />
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="./species.js"></script>
</body>
</html>

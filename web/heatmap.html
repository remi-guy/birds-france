<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Heatmap – Observations d’oiseaux (Phasianidae)</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header class="title-bar">
    <h1>
      Densité (heatmap) des observations cumulatives — jusqu’en
      <span id="titleYear">—</span>
    </h1>
    <p>Phasianidae · France métropolitaine · intensité = densité d’observations</p>
  </header>

  <div id="map"></div>

  <div class="panel">
    <div class="panel-left">
      <div><b>Année :</b> <span id="yearValue">—</span></div>
      <div class="muted" id="countValue">Points: —</div>
    </div>

    <input id="yearSlider" type="range" min="2000" max="2025" step="1" value="2015" />
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet.heat plugin -->
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="./heatmap.js"></script>
</body>
</html>

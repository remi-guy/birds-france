<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Choropleth – Observations par maille 10 km</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header class="title-bar">
    <h1>
      Observations de Phasianidae par maille 10 km — <span id="titleYear">—</span>
    </h1>
    <p>Année par année · couleur = nombre d’observations</p>
  </header>

  <div id="map"></div>

  <div class="panel">
    <div class="panel-left">
      <div><b>Année :</b> <span id="yearValue">—</span></div>
      <div class="muted" id="countValue">Total: —</div>
    </div>
    <input id="yearSlider" type="range" min="2000" max="2025" step="1" value="2015" />
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./grid_choropleth.js"></script>
</body>
</html>
